services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: electroscan
      POSTGRES_PASSWORD: electroscan123
      POSTGRES_DB: electroscan
    ports:
      - "5433:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://electroscan:electroscan123@db:5432/electroscan
      JWT_SECRET_KEY: dev_secret_key_cambiar_en_produccion
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      FOTO_STORAGE: local
      FOTO_LOCAL_PATH: ./uploads
    depends_on:
      - db
